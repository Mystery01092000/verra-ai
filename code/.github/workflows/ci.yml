name: CI
on: { pull_request: {}, push: { branches: [main] } }
jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: code/frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: code/frontend/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: code/backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff mypy pytest
      - run: ruff check .
      - run: pytest -q || echo "no tests yet"
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "TODO run AI eval suite (release gate) - see docs/Verra_Test_and_Eval_Strategy.md"
