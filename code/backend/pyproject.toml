# Root Python config (ADR-0016). Each service has its own pyproject; tool config is shared here.
[tool.ruff]
line-length = 100
target-version = "py312"
[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC"]
[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["services", "packages"]
