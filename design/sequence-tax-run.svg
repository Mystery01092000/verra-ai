<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="900" viewBox="0 0 1480 900" font-family="Arial, Helvetica, sans-serif">
<rect width="1480" height="900" fill="#FBFAFF"/>
<text x="40" y="42" font-size="26" font-weight="bold" fill="#111114">Sequence — one Tax-Analysis run through the orchestrator</text>
<defs><marker id="m" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5566FF"/></marker>
<marker id="mr" markerWidth="9" markerHeight="9" refX="1" refY="3" orient="auto"><path d="M7,0 L1,3 L7,6 Z" fill="#1FBF75"/></marker></defs>
<!-- lifelines -->
<g font-size="12.5" text-anchor="middle">
<!-- x positions -->
<!-- Module 90, Gateway 270, Guardrails 450, Orchestrator 660, ModelGW 900, Provider 1100, HITL 1280, Audit 1420 -->
</g>
<g>
<!-- heads -->
<g font-size="12.5" font-weight="bold" text-anchor="middle" fill="#111114">
<rect x="40" y="70" width="120" height="40" rx="8" fill="#E6E8FF" stroke="#5566FF"/><text x="100" y="95">Tax Module</text>
<rect x="200" y="70" width="120" height="40" rx="8" fill="#fff" stroke="#C9CDF6"/><text x="260" y="95">Gateway</text>
<rect x="360" y="70" width="120" height="40" rx="8" fill="#FCE9E9" stroke="#E5484D"/><text x="420" y="95">Guardrails</text>
<rect x="540" y="70" width="200" height="40" rx="8" fill="#E4E6FF" stroke="#5566FF"/><text x="640" y="95">Orchestrator core</text>
<rect x="820" y="70" width="130" height="40" rx="8" fill="#111114"/><text x="885" y="95" fill="#fff">Model GW</text>
<rect x="1010" y="70" width="130" height="40" rx="8" fill="#fff" stroke="#C9CDF6"/><text x="1075" y="95">Provider</text>
<rect x="1200" y="70" width="110" height="40" rx="8" fill="#FBF0DC" stroke="#E5A33B"/><text x="1255" y="95">Human</text>
<rect x="1360" y="70" width="90" height="40" rx="8" fill="#111114"/><text x="1405" y="95" fill="#fff">Audit</text>
</g>
<!-- lifelines -->
<g stroke="#D5D5E5" stroke-dasharray="4 4">
<line x1="100" y1="110" x2="100" y2="850"/><line x1="260" y1="110" x2="260" y2="850"/><line x1="420" y1="110" x2="420" y2="850"/>
<line x1="640" y1="110" x2="640" y2="850"/><line x1="885" y1="110" x2="885" y2="850"/><line x1="1075" y1="110" x2="1075" y2="850"/>
<line x1="1255" y1="110" x2="1255" y2="850"/><line x1="1405" y1="110" x2="1405" y2="850"/>
</g>
<!-- messages -->
<g font-size="12.5" fill="#3A3340">
<line x1="100" y1="150" x2="260" y2="150" stroke="#5566FF" stroke-width="1.6" marker-end="url(#m)"/><text x="110" y="143">POST /runs (tax_analysis)</text>
<line x1="260" y1="185" x2="420" y2="185" stroke="#5566FF" stroke-width="1.6" marker-end="url(#m)"/><text x="270" y="178">authN/Z, tenant, idempotency</text>
<line x1="420" y1="220" x2="640" y2="220" stroke="#5566FF" stroke-width="1.6" marker-end="url(#m)"/><text x="430" y="213">input validated, PII redacted, policy OK</text>
<text x="540" y="255" font-weight="bold" fill="#3A33C9">L1 Planner: build task graph + pre-flight budget</text>
<text x="540" y="280" font-weight="bold" fill="#3A33C9">L2 Router: pick agent + model tier + tools</text>
<line x1="640" y1="310" x2="885" y2="310" stroke="#5566FF" stroke-width="1.6" marker-end="url(#m)"/><text x="650" y="303">L3 Executor → model call (budgeted)</text>
<line x1="885" y1="345" x2="1075" y2="345" stroke="#5566FF" stroke-width="1.6" marker-end="url(#m)"/><text x="895" y="338">primary provider (Claude)</text>
<line x1="1075" y1="380" x2="885" y2="380" stroke="#1FBF75" stroke-width="1.6" marker-end="url(#mr)"/><text x="895" y="373" fill="#0d8f57">tokens/cost metered</text>
<text x="660" y="415" fill="#B5292E">on error/timeout → fallback chain (secondary → self-host → degraded)</text>
<line x1="640" y1="450" x2="885" y2="450" stroke="#5566FF" stroke-width="1.6" marker-end="url(#m)"/><text x="650" y="443">tool calls: doc parse, tax calculators (deterministic)</text>
<text x="540" y="490" font-weight="bold" fill="#3A33C9">L4 Critic: grounding/citation + schema + numeric check + confidence</text>
<line x1="640" y1="525" x2="1255" y2="525" stroke="#E5A33B" stroke-width="1.6" marker-end="url(#m)"/><text x="650" y="518">consequential/low-confidence → approval gate</text>
<line x1="1255" y1="560" x2="640" y2="560" stroke="#1FBF75" stroke-width="1.6" marker-end="url(#mr)"/><text x="700" y="553" fill="#0d8f57">approve / edit / reject</text>
<line x1="640" y1="595" x2="1405" y2="595" stroke="#111114" stroke-width="1.4" marker-end="url(#m)"/><text x="650" y="588">write audit event + action receipt</text>
<line x1="640" y1="630" x2="100" y2="630" stroke="#1FBF75" stroke-width="1.6" marker-end="url(#mr)"/><text x="160" y="623" fill="#0d8f57">result: cited plan + report + cost/tokens (SSE stream throughout)</text>
</g>
<text x="40" y="700" font-size="13" fill="#8A8A95">Guardrails run on every inbound request and outbound response. Cost/token manager meters each model/tool call and can pause on budget breach.</text>
<text x="40" y="724" font-size="13" fill="#8A8A95">Long-running steps checkpoint via the durable workflow engine and resume after approval or restart.</text>
</g>
</svg>
